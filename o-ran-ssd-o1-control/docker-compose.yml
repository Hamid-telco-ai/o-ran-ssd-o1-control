services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ssd_xapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/ssd_xapp
      REDIS_URL: redis://redis:6379/0
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m app.db.init_db && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
